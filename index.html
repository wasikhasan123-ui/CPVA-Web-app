<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="CPVA - Chattogram Private Veterinary Association Member Portal">

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#2E7D32">
  <meta name="msapplication-TileColor" content="#2E7D32">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CPVA">
  <meta name="application-name" content="CPVA">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <!-- Icons -->
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">

  <!-- Firebase compat SDK (loaded before Flutter) -->
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-messaging-compat.js"></script>

  <script>
    // Firebase web config (used for web push + Firestore on web)
    window.firebaseConfig = {
      apiKey: "AIzaSyCUsmoosXpL7MZbP_RGMCjRodX2bSSaiSY",
      authDomain: "cpva-26cb3.firebaseapp.com",
      projectId: "cpva-26cb3",
      storageBucket: "cpva-26cb3.firebasestorage.app",
      messagingSenderId: "339347372151",
      appId: "1:339347372151:web:d7dcd060780dfa84562e72"
    };
    window.firebaseVapidKey = "[REDACTED_SECRET]";
  </script>

  <title>CPVA - Chattogram Private Veterinary Association</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      overflow: hidden;
    }

    /* Splash screen while Flutter loads */
    #splash {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      z-index: 9999;
      transition: opacity 0.5s;
    }
    #splash img {
      width: 120px;
      height: auto;
      margin-bottom: 16px;
    }
    #splash h1 {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 32px;
      font-weight: 800;
      color: #2E7D32;
      margin: 0 0 8px 0;
      letter-spacing: 2px;
    }
    #splash p {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 13px;
      color: #666;
      margin: 0;
    }

    /* Install banner */
    #install-banner {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(135deg, #2E7D32, #4CAF50);
      color: white;
      padding: 16px 20px;
      display: none;
      align-items: center;
      justify-content: space-between;
      z-index: 10000;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.2);
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    #install-banner .info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #install-banner .info img {
      width: 40px;
      height: 40px;
      border-radius: 10px;
    }
    #install-banner .info span {
      font-size: 14px;
      font-weight: 600;
    }
    #install-banner button {
      background: white;
      color: #2E7D32;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    #install-banner .close {
      background: transparent;
      color: white;
      border: none;
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <!-- Splash screen -->
  <div id="splash">
    <img src="icons/Icon-512.png" alt="CPVA">
    <h1>CPVA</h1>
    <p>Chattogram Private Veterinary Association</p>
  </div>

  <!-- Install banner -->
  <div id="install-banner">
    <div class="info">
      <img src="icons/Icon-192.png" alt="CPVA">
      <span>Install CPVA App</span>
    </div>
    <div style="display:flex;align-items:center;">
      <button id="install-btn">Install</button>
      <button class="close" id="install-close">&times;</button>
    </div>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Hide splash when Flutter is ready
    window.addEventListener('flutter-first-frame', function() {
      var splash = document.getElementById('splash');
      if (splash) {
        splash.style.opacity = '0';
        setTimeout(function() { splash.style.display = 'none'; }, 500);
      }
    });

    // PWA Install Prompt
    let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;

      // Show install banner after 3 seconds
      setTimeout(() => {
        document.getElementById('install-banner').style.display = 'flex';
      }, 3000);
    });

    document.getElementById('install-btn').addEventListener('click', () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((choiceResult) => {
          if (choiceResult.outcome === 'accepted') {
            document.getElementById('install-banner').style.display = 'none';
          }
          deferredPrompt = null;
        });
      }
    });

    document.getElementById('install-close').addEventListener('click', () => {
      document.getElementById('install-banner').style.display = 'none';
    });

    // Detect if already installed (standalone mode)
    if (window.matchMedia('(display-mode: standalone)').matches) {
      document.getElementById('install-banner').style.display = 'none';
    }
  </script>
</body>
</html>
