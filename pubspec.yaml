name: cpva_app
description: "Chattogram Private Veterinary Association (CPVA) Mobile Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4
  firebase_messaging: ^15.1.3

  # Routing
  go_router: ^14.2.7

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Network & Storage
  shared_preferences: ^2.3.2
  cached_network_image: ^3.4.1
  http: ^1.2.2

  # UI Components
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0
  lottie: ^3.1.2
  smooth_page_indicator: ^1.2.0+3

  # Image Picker
  image_picker: ^1.1.2
  file_picker: ^8.1.2

  # QR Code & PDF
  qr_flutter: ^4.1.0
  pdf: ^3.11.1
  printing: ^5.13.3
  path_provider: ^2.1.4

  # Date/Time
  table_calendar: ^3.1.2

  # Utils
  get_it: ^7.7.0
  dartz: ^0.10.1
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  phone_number: ^2.1.0

  # Charts (for admin dashboard)
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/data/members.json
    - assets/data/executives.json
    - assets/data/notices.json
    - assets/data/events.json
    - assets/data/news.json
    - assets/data/gallery.json
    - assets/data/contacts.json
